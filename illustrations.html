  <script>
    // Header shadow on scroll
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      header.style.boxShadow = window.scrollY > 10 ? '0 2px 20px rgba(0,0,0,0.06)' : '';
    });

    // Snap gallery — scale + opacity in/out effect + dot tracking
    const scroll = document.getElementById('gallery-main');
    const dots   = document.querySelectorAll('.gallery-dot');

    function updateGallery() {
      const slides   = scroll.querySelectorAll('.gallery-slide');
      const slideW   = slides[0] ? slides[0].offsetWidth : scroll.clientWidth;
      const viewCenter = scroll.scrollLeft + scroll.clientWidth / 2;

      // Scale / opacity
      slides.forEach(slide => {
        const slideCenter = slide.offsetLeft + slideW / 2;
        const dist  = Math.abs(viewCenter - slideCenter);
        const ratio = Math.min(dist / scroll.clientWidth, 1);
        const img   = slide.querySelector('img');
        if (img) {
          img.style.transform = `scale(${1 - ratio * 0.07})`;
          img.style.opacity   = 1 - ratio * 0.5;
        }
      });

      // Active dot — snap increments are exactly 1 slideW apart
      const activeIdx = Math.round(scroll.scrollLeft / slideW);
      dots.forEach((dot, i) => dot.classList.toggle('active', i === activeIdx));
    }

    scroll.addEventListener('scroll', updateGallery, { passive: true });
    requestAnimationFrame(updateGallery);

    // Hamburger menu
    const hamburger = document.getElementById('nav-hamburger');
    const siteNav = document.getElementById('site-nav');
    hamburger.addEventListener('click', () => {
      const isOpen = siteNav.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', isOpen);
    });
    siteNav.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        siteNav.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', false);
      });
    });
  </script>
