<body>

      </nav>

  <!-- HERO -->
  <section class="illus-hero">
    <div class="illus-hero-inner">
      <h1>Illustrations</h1>
      <p>Drawing is my way of thinking out loud. It offers me a space to explore fluid narratives and imaginary worlds—freely, without the constraints of pixels and grids.</p>
    </div>
  </section>

  <!-- GALLERY — bento grid -->
  <section class="bento-section">
    <div class="bento-grid">
      <div class="bento-item"><img src="illus-dark-1.png"   alt="Illustration — anime girl with long hair, dark palette" /></div>
      <div class="bento-item"><img src="illus-dark-2.png"   alt="Illustration — anime figure in white coat, dark palette" /></div>
      <div class="bento-item"><img src="illus-dark-3.png"   alt="Illustration — figure with red strings on black" /></div>
      <div class="bento-item bento-wide"><img src="illus-dark-4.png"   alt="Illustration — dark space scene with multiple figures" /></div>
      <div class="bento-item"><img src="illus-dark-5.png"   alt="Illustration — panoramic dark banner with character" /></div>
      <div class="bento-item bento-wide"><img src="illus-dark-6.jpeg"  alt="Illustration — four illustrated panels, dark-bordered" /></div>
      <div class="bento-item"><img src="illus-light-1.png"  alt="Illustration — rooftop scene in snow" /></div>
      <div class="bento-item"><img src="illus-light-2.jpeg" alt="Illustration — The Life Game, teal and white" /></div>
      <div class="bento-item bento-wide"><img src="illus-light-3.png"  alt="Illustration — figure before jungle dinosaur mural" /></div>
    </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&#x2715;</button>
    <button class="lightbox-prev"  id="lightbox-prev"  aria-label="Previous"><span class="lb-arrow lb-arrow-left"></span></button>
    <button class="lightbox-next"  id="lightbox-next"  aria-label="Next"><span class="lb-arrow lb-arrow-right"></span></button>
    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="" />
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-top">
        <div class="footer-heading-row">
          <h2 class="footer-heading">Lets create cool things together!</h2>
          <div class="footer-socials">
            <a href="https://www.linkedin.com/in/mona-li/?locale=en_US" target="_blank" class="social-btn" aria-label="LinkedIn">
              <img src="https://www.figma.com/api/mcp/asset/41dd54f7-e084-4bb3-bc85-3de86c046390" alt="LinkedIn" />
            </a>
            <a href="https://dribbble.com/mona-li" target="_blank" class="social-btn" aria-label="Dribbble">
              <img src="https://www.figma.com/api/mcp/asset/b7838e08-ab51-4443-86c5-19fd5e877573" alt="Dribbble" />
            </a>
            <a href="mailto:monali14520@gmail.com" class="social-btn" aria-label="Email">
              <img src="email-icon.svg" alt="Email" />
            </a>

        </div>
        <div class="footer-cta-row">
          <a href="mailto:monali14520@gmail.com" class="footer-cta">
            Get in Touch
            <img src="email-icon.svg" alt="" style="width:20px;height:20px;" />
          </a>
        </div>
      </div>
      <div class="footer-bottom">
        <p class="footer-copy">© 2026 Mona Li. All rights reserved.</p>
      </div>
      <button class="scroll-up-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
        <img src="https://www.figma.com/api/mcp/asset/90374bd0-a481-41d2-a69c-400b284762d1" alt="" />
      </button>
    </div>
  </footer>

  <script>
    // Header shadow on scroll
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      header.style.boxShadow = window.scrollY > 10 ? '0 2px 20px rgba(0,0,0,0.06)' : '';
    });

    // Bento grid — fade in items as they enter viewport
    const bentoItems = document.querySelectorAll('.bento-item');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.12 });
    bentoItems.forEach(item => observer.observe(item));

    // Lightbox
    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lightbox-img');
    const lbClose    = document.getElementById('lightbox-close');
    const lbPrev     = document.getElementById('lightbox-prev');
    const lbNext     = document.getElementById('lightbox-next');
    const images     = [...document.querySelectorAll('.bento-item img')];
    let current      = 0;

    function openLightbox(idx) {
      current = idx;
      lbImg.src = images[current].src;
      lbImg.alt = images[current].alt;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      lbPrev.style.display = images.length > 1 ? '' : 'none';
      lbNext.style.display = images.length > 1 ? '' : 'none';
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }
    function showPrev() { current = (current - 1 + images.length) % images.length; lbImg.src = images[current].src; lbImg.alt = images[current].alt; }
    function showNext() { current = (current + 1) % images.length; lbImg.src = images[current].src; lbImg.alt = images[current].alt; }

    images.forEach((img, i) => {
      img.parentElement.style.cursor = 'zoom-in';
      img.parentElement.addEventListener('click', () => openLightbox(i));
    });
    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
    lbNext.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox || e.target === lbImg.parentElement) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  showPrev();
      if (e.key === 'ArrowRight') showNext();
    });

    // Hamburger menu
    const hamburger = document.getElementById('nav-hamburger');
    const siteNav = document.getElementById('site-nav');
    hamburger.addEventListener('click', () => {
      const isOpen = siteNav.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', isOpen);
    });
    siteNav.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        siteNav.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', false);
      });
    });
  </script>
  <script src="animations.js"></script>
</body>
</html>
